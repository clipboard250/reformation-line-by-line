<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Reformation, Line by Line</title>
<meta name="description" content="Side-by-side primary source comparisons between Martin Luther and official Catholic teaching." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,500;0,700;1,400&family=Nunito+Sans:opsz,wght@6..12,400;6..12,500;6..12,600;6..12,700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#FDFAF5;--bg2:#F0EBE1;
  --ink:#2E2820;--ink2:#5C5347;--ink3:#8A7F72;
  --lu:#1D5D8C;--lu-bg:#E6F0F9;--lu-bd:#9FC5E3;--lu-glow:#D0E4F5;
  --ca:#8B2E2E;--ca-bg:#FAEDEC;--ca-bd:#DBA7A4;--ca-glow:#F0D0CD;
  --gr:#3D6E35;--gr-bg:#ECF4EA;--gr-bd:#A8CDA1;
  --body:'Nunito Sans',system-ui,sans-serif;
  --hd:'Bitter',Georgia,serif;
  --mw:1120px;--r:12px;
  --shadow:0 2px 8px rgba(46,40,32,.08);
  --shadow-lg:0 6px 24px rgba(46,40,32,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased}

/* NAV */
.N{background:linear-gradient(180deg,#2E2820 0%,#3A3228 100%);color:#faf6f0;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.N .br{font-family:var(–hd);font-weight:700;font-size:17px;cursor:pointer;letter-spacing:-.01em}
.N .lk{display:flex;gap:6px}
.N .lk button{background:rgba(255,255,255,.1);border:0;color:#faf6f0;padding:7px 16px;border-radius:20px;font-family:var(–body);font-size:13px;font-weight:600;cursor:pointer;transition:.2s;backdrop-filter:blur(4px)}
.N .lk button:hover,.N .lk button.on{background:rgba(255,255,255,.25)}

/* TIMELINE */
.TL{background:var(–bg2);border-bottom:1px solid #D5CFC3;padding:10px 20px;display:flex;align-items:center;gap:4px;overflow-x:auto;position:sticky;top:56px;z-index:90;-ms-overflow-style:none;scrollbar-width:none}
.TL::-webkit-scrollbar{display:none}
.TL .sg{flex:1;min-width:14px;height:2px;background:#C5BBAB;border-radius:1px}
.TL .ch{flex-shrink:0;padding:6px 14px;border-radius:20px;cursor:pointer;text-align:center;transition:.2s;border:1px solid transparent}
.TL .ch:hover{background:rgba(0,0,0,.05);border-color:#C5BBAB}
.TL .yr{font-family:var(–hd);font-weight:700;font-size:14px;color:var(–ink);display:block;line-height:1.2}
.TL .lb{font-size:10px;color:var(–ink3);white-space:nowrap}

/* MODE BAR */
.MB{display:flex;align-items:center;justify-content:center;gap:0;margin:0 auto 28px;width:fit-content;border-radius:28px;overflow:hidden;border:2px solid #D5CFC3;background:var(–bg2);box-shadow:var(–shadow)}
.MB button{padding:11px 26px;border:0;font-family:var(–body);font-size:14px;font-weight:700;cursor:pointer;background:transparent;color:var(–ink2);transition:.25s}
.MB button.on{background:var(–ink);color:#faf6f0;border-radius:24px;box-shadow:0 2px 8px rgba(46,40,32,.2)}

/* PRIMARY TOGGLE */
.PT{display:flex;align-items:center;gap:10px;font-size:13px;color:var(–ink2);margin-bottom:22px;font-weight:500}
.PT input[type=checkbox]{-webkit-appearance:none;appearance:none;width:42px;height:24px;background:#C5BBAB;border-radius:12px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.PT input::after{content:’’;position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.PT input:checked{background:var(–ink)}
.PT input:checked::after{transform:translateX(18px)}

/* HOME */
.H{max-width:var(–mw);margin:0 auto;padding:52px 20px 80px}
.hero{text-align:center;margin-bottom:48px}
.hero h1{font-family:var(–hd);font-size:clamp(30px,6vw,46px);font-weight:700;line-height:1.12;margin-bottom:14px;color:var(–ink)}
.hero .su{font-size:clamp(16px,2.5vw,19px);color:var(–ink2);max-width:580px;margin:0 auto 24px;line-height:1.55}
.hero .ln{width:60px;height:3px;background:linear-gradient(90deg,var(–lu),var(–ca));margin:0 auto;border-radius:2px}

.hw{background:#fff;border:1px solid #E0D8CC;border-radius:var(–r);padding:24px 28px;margin-bottom:36px;max-width:620px;box-shadow:var(–shadow)}
.hw h2{font-family:var(–hd);font-size:18px;margin-bottom:10px}
.hw ol{padding-left:20px;font-size:15px;color:var(–ink2)}
.hw ol li{margin-bottom:5px}

.disc{background:#fff;border-left:4px solid var(–ca);padding:16px 22px;border-radius:0 var(–r) var(–r) 0;font-size:14px;color:var(–ink2);max-width:620px;margin-bottom:40px;box-shadow:var(–shadow)}

.st{font-family:var(–hd);font-size:22px;margin-bottom:16px}

.GR{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.CD{background:#fff;border:1px solid #E0D8CC;border-radius:var(–r);padding:22px;cursor:pointer;transition:.3s;position:relative;overflow:hidden;box-shadow:var(–shadow)}
.CD::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(–lu),var(–ca));opacity:0;transition:.3s}
.CD:hover{transform:translateY(-4px);box-shadow:var(–shadow-lg);border-color:#C5BBAB}
.CD:hover::after{opacity:1}
.CD:active{transform:translateY(-1px)}
.CD .ic{font-size:32px;margin-bottom:8px;display:block}
.CD h3{font-family:var(–hd);font-size:17px;margin-bottom:6px;line-height:1.3}
.CD .cq{font-size:14px;color:var(–ink2);line-height:1.45}

/* TOPIC */
.T{max-width:var(–mw);margin:0 auto;padding:28px 20px 80px}
.T .bk{background:0;border:0;font-family:var(–body);font-size:14px;color:var(–ink3);cursor:pointer;margin-bottom:14px;font-weight:600}
.T .bk:hover{color:var(–ink)}
.T .th h1{font-family:var(–hd);font-size:clamp(26px,5vw,34px);font-weight:700;line-height:1.2;margin-bottom:6px}
.T .pl{font-size:17px;color:var(–ink2);font-style:italic;margin-bottom:24px;line-height:1.5}

.SD{background:#fff;border-radius:var(–r);padding:22px 26px;margin-bottom:28px;border:2px solid #D5CFC3;font-size:16px;line-height:1.7;color:var(–ink);box-shadow:var(–shadow)}
.SD strong{font-weight:700;display:block;margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(–ink3)}

/* PANELS */
.PS{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
@media(max-width:800px){.PS{grid-template-columns:1fr}}
.P{border-radius:var(–r);padding:24px;border:2px solid;box-shadow:var(–shadow)}
.P.l{background:var(–lu-bg);border-color:var(–lu-bd)}
.P.c{background:var(–ca-bg);border-color:var(–ca-bd)}
.P .pl-l{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.P.l .pl-l{color:var(–lu)}.P.c .pl-l{color:var(–ca)}
.P .dot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 0 3px}
.P.l .dot{background:var(–lu);box-shadow:0 0 0 3px var(–lu-glow)}
.P.c .dot{background:var(–ca);box-shadow:0 0 0 3px var(–ca-glow)}
.P .mt{font-size:14px;color:var(–ink2);margin-bottom:12px;line-height:1.4}
.P .mt b{color:var(–ink);font-weight:600}
.P .qb{background:rgba(255,255,255,.75);border-left:4px solid;padding:16px 20px;border-radius:0 var(–r) var(–r) 0;margin-bottom:12px;font-size:18px;line-height:1.55;font-family:var(–hd);font-weight:400;font-style:italic;box-shadow:inset 0 1px 3px rgba(0,0,0,.03)}
.P.l .qb{border-color:var(–lu)}.P.c .qb{border-color:var(–ca)}
.P .aq{background:rgba(255,255,255,.45);border-left:3px solid;padding:10px 16px;border-radius:0 var(–r) var(–r) 0;margin-bottom:12px;font-size:14px;line-height:1.5;font-style:italic;color:var(–ink2)}
.P.c .aq{border-color:var(–ca)}
.rf{margin-bottom:10px;display:flex;flex-wrap:wrap;gap:6px}
.rf span{background:rgba(0,0,0,.06);padding:3px 11px;border-radius:14px;font-size:12px;font-weight:600;color:var(–ink2)}
.cx{font-size:15px;color:var(–ink2);line-height:1.65;margin-bottom:14px}
.sl{display:flex;flex-direction:column;gap:5px}
.sl a{font-size:13px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border-radius:8px;transition:.2s;width:fit-content}
.P.l .sl a{color:var(–lu);background:var(–lu-glow)}
.P.c .sl a{color:var(–ca);background:var(–ca-glow)}
.sl a:hover{filter:brightness(.95);transform:translateX(2px)}

/* BOTTOM BOXES */
.BX{border-radius:var(–r);padding:22px 26px;margin-bottom:16px;border:1px solid #D5CFC3;background:#fff;box-shadow:var(–shadow)}
.BX h3{font-family:var(–hd);font-size:17px;margin-bottom:8px}
.BX p{font-size:15px;color:var(–ink2);line-height:1.65;max-width:700px}
.BX.ov{background:var(–gr-bg);border-color:var(–gr-bd)}
.BX.ov h3{color:var(–gr)}
.BX .oq{border-left:4px solid var(–gr);padding:14px 18px;background:rgba(255,255,255,.6);border-radius:0 var(–r) var(–r) 0;font-family:var(–hd);font-style:italic;margin:12px 0;font-size:17px;line-height:1.55}
.BX .on{font-size:15px;color:var(–ink2);margin-bottom:10px;line-height:1.6}
.BX .ol{font-size:13px;font-weight:700;color:var(–gr);text-decoration:none;padding:6px 12px;background:rgba(61,110,53,.1);border-radius:6px;display:inline-block}
.BX .ol:hover{background:rgba(61,110,53,.18)}

/* DATA VIEW */
.DV{max-width:var(–mw);margin:0 auto;padding:28px 20px 80px}
.DV h1{font-family:var(–hd);font-size:28px;margin-bottom:20px}
.DW{overflow-x:auto;border-radius:var(–r);border:1px solid #D5CFC3;box-shadow:var(–shadow)}
.DT{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
.DT th{background:var(–ink);color:#faf6f0;padding:12px 14px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.DT td{padding:12px 14px;border-bottom:1px solid #EDE7DD;vertical-align:top;line-height:1.5}
.DT tr:nth-child(even) td{background:rgba(0,0,0,.02)}
.DT a{color:var(–lu);text-decoration:none;font-weight:600}
.DT a:hover{text-decoration:underline}
.DT .tl{cursor:pointer;font-weight:600;color:var(–ink)}
.DT .tl:hover{color:var(–lu)}

.F{margin-top:auto;background:linear-gradient(180deg,#3A3228 0%,#2E2820 100%);color:rgba(250,246,240,.55);padding:26px;text-align:center;font-size:12px;letter-spacing:.02em}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.a{animation:fadeUp .5s ease-out both}
.a1{animation-delay:.07s}.a2{animation-delay:.14s}.a3{animation-delay:.21s}.a4{animation-delay:.28s}
</style>

</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState } = React;

const TOPICS = [
{
slug: “justification”,
title: “Justification”,
icon: “\u2696\uFE0F”,
plain_line: “How does a person get right with God?”,
simple_difference: “Luther said: faith alone makes you right with God. The Catholic Church said: faith starts it, but God also changes you on the inside.”,
timeline_points: [
{ year: 1520, label: “Freedom of a Christian”, side: “luther”, url: “https://www.projectwittenberg.org/pub/resources/text/wittenberg/luther/web/freedom.html” },

],
luther: {

scripture_refs: [“Romans 3:28”, “Galatians 2:16”],
simple_context: “Luther believed that trusting in Jesus is what saves you — not doing good deeds to earn it. Good works follow naturally, but they’re not what makes you right with God.”,
context: “Luther argued that justification — being declared righteous before God — comes through faith in Christ, not through human works or merit. He distinguished between the ‘inner man,’ freed by faith, and the ‘outer man,’ whose works flow from that freedom but do not earn salvation.”,
urls: [{ label: “Read the full document”, url: “https://www.projectwittenberg.org/pub/resources/text/wittenberg/luther/web/freedom.html” }]
},

scripture_refs: [“James 2:24”, “Romans 5:5”],
simple_context: “The Catholic Church taught that getting right with God isn’t just forgiveness — God also transforms you from the inside. Faith matters, but so does the change God works in you.”,
context: “Trent defined justification as a process that includes forgiveness of sins and an interior transformation by grace. It condemned the formula ‘faith alone’ as Trent understood it — meaning faith without any accompanying renewal or cooperation with grace.”,
urls: [{ label: “Read the Trent decree”, url: “https://www.papalencyclicals.net/councils/trent/sixth-session.htm” }]
},

}
},
{
slug: “authority”,
title: “Scripture & Tradition”,
icon: “\uD83D\uDCD6”,
plain_line: “What’s the final authority for what Christians should believe?”,
simple_difference: “Luther said: the Bible alone is the final word. The Catholic Church said: the Bible and apostolic tradition together, interpreted by the Church.”,
timeline_points: [
{ year: 1520, label: “Address to the Nobility”, side: “luther”, url: “https://www.projectwittenberg.org/pub/resources/text/wittenberg/luther/web/nblty-00.html” },
{ year: 1546, label: “Trent on Scripture”, side: “catholic”, url: “https://www.ewtn.com/catholicism/library/decree-concerning-the-canonical-scriptures-1494” }
],
luther: {
who: “Martin Luther”, year: 1520,
document_title: “Address to the Christian Nobility”,
quote: “Unless I am convinced by the testimony of the Scriptures or by clear reason … I am bound by the Scriptures I have quoted.”,

context: “Luther held that Scripture is the sole infallible authority for doctrine. He challenged the papacy’s claim to be the final interpreter and argued that councils and popes had contradicted each other and could err.”,
urls: [{ label: “Read the full document”, url: “https://www.projectwittenberg.org/pub/resources/text/wittenberg/luther/web/nblty-00.html” }]
},
catholic: {
who_or_council: “Council of Trent, Fourth Session”, year: 1546,
document_title: “Decree Concerning the Canonical Scriptures”,
quote: “These truths and rules are contained in the written books and in the unwritten traditions…”,
additional_quote_optional: null,
scripture_refs: [“2 Thessalonians 2:15”, “John 21:25”],
simple_context: “The Catholic Church said: God’s revelation comes through the Bible AND the teachings passed down from the apostles. The Church’s teaching authority interprets both.”,
context: “Trent affirmed that divine revelation comes through both Scripture and apostolic tradition, received with equal reverence. The Church’s teaching authority (Magisterium) serves as the authentic interpreter of both sources.”,

},
difference_summary: “Luther maintained that Scripture alone is the final authority for Christian doctrine. Trent held that Scripture and apostolic tradition together constitute the full deposit of revelation, interpreted authoritatively by the Church.”,
overlap_today: null
},
{
slug: “papal-primacy”,
title: “Papal Authority”,
icon: “\uD83C\uDFDB\uFE0F”,

timeline_points: [

{ year: 1870, label: “Vatican I”, side: “catholic”, url: “https://www.vatican.va/content/pius-ix/en/documents/constitutio-dogmatica-pastor-aeternus-18-iulii-1870.html” }
],

who: “Martin Luther”, year: 1537,

urls: [{ label: “Read Smalcald Articles II.IV”, url: “https://www.projectwittenberg.org/pub/resources/text/wittenberg/concord/web/smc-02d.html” }]

catholic: {

document_title: “Pastor Aeternus, Chapter 1”,
quote: “A primacy of jurisdiction over the whole Church of God was… promised to… Peter and conferred on him by Christ.”,

scripture_refs: [“Matthew 16:18–19”, “John 21:15–17”],
simple_context: “Vatican I formally taught that Jesus gave Peter authority over the whole Church, and that authority continues through every Pope after him.”,

urls: [{ label: “Read Pastor Aeternus”, url: “https://www.vatican.va/content/pius-ix/en/documents/constitutio-dogmatica-pastor-aeternus-18-iulii-1870.html” }]
},
difference_summary: “Luther denies a universal head of the Church on earth other than Christ. Vatican I defines a continuing universal primacy of jurisdiction for the bishop of Rome as successor of Peter.”,

},
{
slug: “indulgences”,

icon: “\uD83D\uDCDC”,

{ year: 1563, label: “Trent on Indulgences”, side: “catholic”, url: “https://www.papalencyclicals.net/councils/trent/twenty-fifth-session.htm” }

who: “Martin Luther”, year: 1517,
document_title: “Ninety-Five Theses, Thesis 27”,

},
catholic: {

document_title: “Session XXV, Decree on Indulgences”,
