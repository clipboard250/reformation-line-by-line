<style>
:root{
  --bg:#FDFAF5;--bg2:#F5F0E8;
  --ink:#2E2820;--ink2:#5C5347;--ink3:#8A7F72;
  --lu:#2D6A9F;--lu-bg:#EBF3FA;--lu-bd:#B9D4EC;
  --ca:#9B3A3A;--ca-bg:#FAF0EF;--ca-bd:#E0B8B5;
  --gr:#4A7A42;--gr-bg:#EFF6ED;--gr-bd:#B5CDB0;
  --body:'Nunito Sans',system-ui,sans-serif;
  --hd:'Bitter',Georgia,serif;
  --mw:1120px;--r:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body,html{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}

.N{background:#2E2820;color:#faf6f0;padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.N .br{font-family:var(–hd);font-weight:700;font-size:16px;cursor:pointer}
.N .lk{display:flex;gap:6px}
.N .lk button{background:rgba(255,255,255,.08);border:0;color:#faf6f0;padding:6px 14px;border-radius:20px;font-family:var(–body);font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.N .lk button:hover,.N .lk button.on{background:rgba(255,255,255,.22)}

.TL{background:var(–bg2);border-bottom:1px solid #DDD5C8;padding:8px 20px;display:flex;align-items:center;gap:4px;overflow-x:auto;position:sticky;top:54px;z-index:90;-ms-overflow-style:none;scrollbar-width:none}
.TL::-webkit-scrollbar{display:none}
.TL .sg{flex:1;min-width:14px;height:2px;background:#CEC4B4}
.TL .ch{flex-shrink:0;padding:5px 12px;border-radius:20px;cursor:pointer;text-align:center;transition:.2s;border:1px solid transparent}
.TL .ch:hover{background:rgba(0,0,0,.04);border-color:#CEC4B4}
.TL .yr{font-family:var(–hd);font-weight:700;font-size:14px;color:var(–ink);display:block;line-height:1.2}
.TL .lb{font-size:10px;color:var(–ink3);white-space:nowrap}

.MB{display:flex;align-items:center;justify-content:center;gap:0;margin:0 auto 24px;width:fit-content;border-radius:26px;overflow:hidden;border:2px solid #DDD5C8;background:var(–bg2)}
.MB button{padding:10px 24px;border:0;font-family:var(–body);font-size:14px;font-weight:700;cursor:pointer;background:transparent;color:var(–ink2);transition:.2s}
.MB button.on{background:var(–ink);color:#faf6f0;border-radius:22px}

.PT{display:flex;align-items:center;gap:8px;font-size:13px;color:var(–ink2);margin-bottom:20px;font-weight:500}
.PT input[type=checkbox]{appearance:none;-webkit-appearance:none;width:40px;height:22px;background:#CEC4B4;border-radius:11px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.PT input::after{content:’’;position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.PT input:checked{background:var(–ink)}
.PT input:checked::after{transform:translateX(18px)}

.H{max-width:var(–mw);margin:0 auto;padding:48px 20px 80px}
.hero{text-align:center;margin-bottom:44px}
.hero h1{font-family:var(–hd);font-size:clamp(28px,5vw,42px);font-weight:700;line-height:1.15;margin-bottom:10px}
.hero .su{font-size:clamp(15px,2vw,18px);color:var(–ink2);max-width:600px;margin:0 auto 20px;line-height:1.55}
.hero .ln{width:50px;height:3px;background:var(–ink);margin:0 auto;border-radius:2px;opacity:.2}

.hw{background:var(–bg2);border-radius:var(–r);padding:22px 26px;margin-bottom:36px;max-width:620px}
.hw h2{font-family:var(–hd);font-size:17px;margin-bottom:8px}
.hw ol{padding-left:18px;font-size:15px;color:var(–ink2)}
.hw ol li{margin-bottom:4px}

.disc{background:var(–bg2);border-left:4px solid #CEC4B4;padding:14px 20px;border-radius:0 var(–r) var(–r) 0;font-size:14px;color:var(–ink2);max-width:620px;margin-bottom:36px}

.st{font-family:var(–hd);font-size:21px;margin-bottom:14px}

.GR{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.CD{background:#fff;border:1px solid #E6DFD3;border-radius:var(–r);padding:20px;cursor:pointer;transition:.25s;position:relative;overflow:hidden}
.CD::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(–lu),var(–ca));opacity:0;transition:.25s}
.CD:hover{transform:translateY(-3px);box-shadow:0 4px 14px rgba(0,0,0,.08);border-color:#D0C7B8}
.CD:hover::after{opacity:1}
.CD .ic{font-size:28px;margin-bottom:6px;display:block}
.CD h3{font-family:var(–hd);font-size:16px;margin-bottom:5px;line-height:1.3}
.CD .cq{font-size:14px;color:var(–ink2);line-height:1.4}

.T .pl{font-size:16px;color:var(–ink2);font-style:italic;margin-bottom:22px;line-height:1.5}

.SD strong{font-weight:700;display:block;margin-bottom:2px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(–ink3)}

.PS{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px}
@media(max-width:800px){.PS{grid-template-columns:1fr}}
.P{border-radius:var(–r);padding:22px;border:1.5px solid;box-shadow:0 1px 4px rgba(0,0,0,.05)}

.P.c{background:var(–ca-bg);border-color:var(–ca-bd)}

.P .mt{font-size:14px;color:var(–ink2);margin-bottom:10px;line-height:1.4}

.P.l .qb{border-color:var(–lu)}.P.c .qb{border-color:var(–ca)}

.P.c .aq{border-color:var(–ca)}
.rf{margin-bottom:8px;display:flex;flex-wrap:wrap;gap:5px}
.rf span{background:rgba(0,0,0,.05);padding:2px 10px;border-radius:14px;font-size:12px;font-weight:600;color:var(–ink2)}
.cx{font-size:15px;color:var(–ink2);line-height:1.6;margin-bottom:12px}
.sl{display:flex;flex-direction:column;gap:4px}
.sl a{font-size:13px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:6px;background:rgba(0,0,0,.04);transition:.2s;width:fit-content}
.P.l .sl a{color:var(–lu)}.P.c .sl a{color:var(–ca)}

.BX p{font-size:15px;color:var(–ink2);line-height:1.6;max-width:700px}
.BX.ov{background:var(–gr-bg);border-color:var(–gr-bd)}
.BX.ov h3{color:var(–gr)}
.BX .oq{border-left:4px solid var(–gr);padding:12px 16px;background:rgba(255,255,255,.6);border-radius:0 var(–r) var(–r) 0;font-family:var(–hd);font-style:italic;margin:10px 0;font-size:16px;line-height:1.55}
.BX .on{font-size:14px;color:var(–ink2);margin-bottom:8px;line-height:1.55}
.BX .ol{font-size:13px;font-weight:600;color:var(–gr);text-decoration:none}
.BX .ol:hover{text-decoration:underline}

.DV{max-width:var(–mw);margin:0 auto;padding:28px 20px 80px}
.DV h1{font-family:var(–hd);font-size:26px;margin-bottom:18px}
.DW{overflow-x:auto;border-radius:var(–r);border:1px solid #DDD5C8;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.DT{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
.DT th{background:var(–ink);color:#faf6f0;padding:10px 14px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.DT td{padding:11px 14px;border-bottom:1px solid #EDE7DD;vertical-align:top;line-height:1.5}
.DT tr:nth-child(even) td{background:rgba(0,0,0,.015)}
.DT a{color:var(–lu);text-decoration:none;font-weight:600}
.DT a:hover{text-decoration:underline}
.DT .tl{cursor:pointer;font-weight:600;color:var(–ink)}
.DT .tl:hover{color:var(–lu)}

.F{margin-top:auto;background:var(–ink);color:rgba(250,246,240,.6);padding:22px;text-align:center;font-size:12px}

@keyframes R{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.r{animation:R .4s ease-out both}
.r1{animation-delay:.06s}.r2{animation-delay:.12s}.r3{animation-delay:.18s}.r4{animation-delay:.24s}
</style>

</head>

  return (
    <div className="TL">

        <React.Fragment key={i}>

          <div className="ch" onClick={() => x.url && window.open(x.url, "_blank", "noopener")}>
            <span className="yr">{x.year}</span>
            <span className="lb">{x.label}</span>

      ))}
    </div>
  );
}

}

  return (

      {!simple && (

      )}

      {simple && (
        <div className="SD r r2">
          <strong>The short version</strong>
          {t.simple_difference}

      <div className="PS r r2">

          {lu.scripture_refs.length > 0 && <div className="rf">{lu.scripture_refs.map((s) => <span key={s}>{s}</span>)}</div>}
          {!po && <p className="cx">{simple ? lu.simple_context : lu.context}</p>}
          <div className="sl">{lu.urls.map((u) => <a key={u.url} href={u.url} target="_blank" rel="noopener noreferrer">{u.label} \u2197</a>)}</div>
        </div>
        <div className="P c">
          <div className="pl-l"><span className="dt" /> Catholic Response</div>
          <div className="mt"><b>{ca.who_or_council}</b> \u00B7 {ca.year} \u00B7 <em>{ca.document_title}</em></div>
          <div className="qb">\u201C{ca.quote}\u201D</div>
          {ca.additional_quote_optional && !simple && <div className="aq">{ca.additional_quote_optional}</div>}

// APP
// ═══════════════════════════════════════════
function App() {
  const [page, setPage] = useState("home");
  const [slug, setSlug] = useState(null);
  const go = (target, s) => {
    if (target === "topic") { setPage("topic"); setSlug(s); } else { setPage(target); setSlug(null); }
    window.scrollTo({ top: 0, behavior: "smooth" });
  };
  const topic = page === "topic" ? TOPICS.find((t) => t.slug === slug) : null;
  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      <nav className="N">
        <span className="br" onClick={() => go("home")}>Reformation, Line by Line</span>
        <div className="lk">
          <button className={page === "home" ? "on" : ""} onClick={() => go("home")}>Topics</button>
          <button className={page === "data" ? "on" : ""} onClick={() => go("data")}>Data View</button>
        </div>
      </nav>
      {(page === "home" || page === "topic") && <Timeline topic={topic} />}
      {page === "home" && <Home go={go} />}
      {page === "topic" && <TopicPage slug={slug} go={go} />}
      {page === "data" && <DataView go={go} />}
      <footer className="F">A documentation project \u00B7 Primary sources only \u00B7 No position taken</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
